name: Notify Telegram on KernelSU release

permissions:
  contents: write

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch latest KernelSU release
        id: release
        run: |
          python - <<'PY'
          import json, os, urllib.request
          url = "https://api.github.com/repos/tiann/KernelSU/releases/latest"
          with urllib.request.urlopen(url) as r:
              data = json.load(r)
          tag = data["tag_name"]
          title = data.get("name", "").strip().replace("\n", " ").replace("\r", " ")
          html_url = data["html_url"]
          with open(os.environ["GITHUB_OUTPUT"], "w") as out:
              out.write(f"tag={tag}\n")
              out.write(f"title={title}\n")
              out.write(f"url={html_url}\n")
          PY

      - name: Load last announced tag
        id: last
        run: |
          LAST=""
          if [ -f .github/last_announced_tag.txt ]; then
            LAST="$(cat .github/last_announced_tag.txt)"
          fi
          echo "last=$LAST" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        if: steps.last.outputs.last != steps.release.outputs.tag
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python - <<'PY'
          import os, urllib.request, urllib.parse

          def escape_md(text):
              for ch in r"_*[]()~`>#+-=|{}.!":
                  text = text.replace(ch, "\\" + ch)
              return text

          title = escape_md(os.environ["RELEASE_TITLE"])
          tag = escape_md(os.environ["RELEASE_TAG"])
          url = escape_md(os.environ["RELEASE_URL"])

          message = "\n".join([
              "*CHANGELOG*",
              f"*TITLE:* {title}",
              f"*Tag:* `{tag}`",
              f"*Link:* {url}"
          ])

          data = {
              "chat_id": os.environ["CHAT_ID"],
              "text": message,
              "parse_mode": "MarkdownV2"
          }

          req = urllib.request.Request(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              data=urllib.parse.urlencode(data).encode(),
              method="POST"
          )
          with urllib.request.urlopen(req) as resp:
              resp.read()
          PY

      - name: Save announced tag
        if: steps.last.outputs.last != steps.release.outputs.tag
        run: |
          mkdir -p .github
          echo "${{ steps.release.outputs.tag }}" > .github/last_announced_tag.txt

      - name: Commit and push updated tag
        if: steps.last.outputs.last != steps.release.outputs.tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last_announced_tag.txt
          git commit -m "Update announced KernelSU release to ${{ steps.release.outputs.tag }}"
          git push origin HEAD:refs/heads/${{ github.ref_name }}
