name: Notify Telegram on KernelSU release

permissions:
  contents: write

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch latest KernelSU release
        id: release
        run: |
          python - <<'PY'
          import json, os, urllib.request
          url = "https://api.github.com/repos/tiann/KernelSU/releases/latest"
          req = urllib.request.Request(url, headers={
              "Accept": "application/vnd.github+json",
              "User-Agent": "github-actions"
          })
          with urllib.request.urlopen(req) as r:
              data = json.load(r)

          tag = data["tag_name"]
          name = data.get("name", "").strip()
          body = data.get("body", "").strip()
          html_url = data["html_url"]
          assets = [a["browser_download_url"] for a in data.get("assets", []) if a.get("browser_download_url")]
          apk_links = [u for u in assets if u.lower().endswith(".apk")]

          with open(os.environ["GITHUB_OUTPUT"], "w") as out:
              out.write(f"tag={tag}\n")
              out.write(f"name={name}\n")
              out.write("body<<EOF\n")
              out.write(body + "\n")
              out.write("EOF\n")
              out.write(f"url={html_url}\n")
              out.write(f"apk={','.join(apk_links)}\n")
          PY

      - name: Load last announced tag
        id: last
        run: |
          LAST=""
          if [ -f .github/last_announced_tag.txt ]; then
            LAST="$(cat .github/last_announced_tag.txt)"
          fi
          echo "last=$LAST" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        if: steps.last.outputs.last != steps.release.outputs.tag
        env:
          TAG: ${{ steps.release.outputs.tag }}
          NAME: ${{ steps.release.outputs.name }}
          BODY: ${{ steps.release.outputs.body }}
          URL: ${{ steps.release.outputs.url }}
          APK: ${{ steps.release.outputs.apk }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python - <<'PY'
          import os, urllib.parse, urllib.request
          tag = os.environ["TAG"]
          name = os.environ["NAME"]
          body = os.environ["BODY"]
          url = os.environ["URL"]
          apk = os.environ.get("APK", "")
          lines = [
              "NEW KERNELSU RELEASE UPDATE",
              "",
              f"Tag: {tag}",
              f"Name: {name}",
              "",
              "Changelog:",
              body,
              "",
              "GitHub release:",
              url,
          ]
          if apk:
              lines.extend(["", "APK:"])
              lines.extend(apk.split(","))
          text = "\n".join(lines)
          data = urllib.parse.urlencode({"chat_id": os.environ["CHAT_ID"], "text": text})
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              data=data.encode("utf-8"),
              headers={"Content-Type": "application/x-www-form-urlencoded"},
          )
          with urllib.request.urlopen(req) as response:
              print(response.read().decode())
          PY

      - name: Save announced tag
        if: steps.last.outputs.last != steps.release.outputs.tag
        run: |
          mkdir -p .github
          echo "${{ steps.release.outputs.tag }}" > .github/last_announced_tag.txt

      - name: Commit and push updated tag
        if: steps.last.outputs.last != steps.release.outputs.tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last_announced_tag.txt
          git commit -m "Update announced KernelSU release to ${{ steps.release.outputs.tag }}"
          git push origin HEAD:refs/heads/${{ github.ref_name }}
