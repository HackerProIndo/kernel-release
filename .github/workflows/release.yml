name: Notify Telegram on KernelSU release

permissions:
  contents: write

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch latest KernelSU release and notify Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python - <<'PY'
          import json, os, sys, urllib.request, urllib.parse

          repo = "tiann/KernelSU"
          api = f"https://api.github.com/repos/{repo}/releases/latest"

          try:
              with urllib.request.urlopen(api, timeout=30) as r:
                  data = json.load(r)
          except Exception as e:
              print("Failed to fetch release:", e)
              sys.exit(1)

          tag = data.get("tag_name", "") or ""
          title = (data.get("name") or "").strip()
          body = (data.get("body") or "").strip()
          html_url = data.get("html_url", "") or ""
          apk_url = ""
          apk_name = ""
          for a in data.get("assets", []):
              name = a.get("name", "") or ""
              if name.lower().endswith(".apk"):
                  apk_url = a.get("browser_download_url", "") or ""
                  apk_name = name
                  break

          # read last announced tag
          last_path = ".github/last_announced_tag.txt"
          last = ""
          if os.path.isfile(last_path):
              try:
                  with open(last_path, "r", encoding="utf-8") as f:
                      last = f.read().strip()
              except:
                  last = ""

          if tag == last:
              print("No new release to announce (tag unchanged).")
              sys.exit(0)

          # compose message with full changelog (plain text)
          parts = []
          parts.append("Manager")
          if title:
              parts.append(f"TITLE: {title}")
          if tag:
              parts.append(f"Tag: {tag}")
          if body:
              parts.append("Changelog:")
              parts.append(body)
          if apk_url:
              parts.append(f"APK: {apk_url}")
          if html_url:
              parts.append(f"Release page: {html_url}")

          message = f"""
          🚀 <b>Manager KernelSU Release</b>

              <b>Version:</b> {tag}
              <b>Title:</b> {title if title else '-'} 

              <b>Changelog:</b>
              <tg-spoiler>{body if body else 'No changelog provided'}</tg-spoiler>

          🔗 <b>Repository:</b> https://github.com/tiann/KernelSU
          📦 <b>Download APK:</b> {apk_url if apk_url else 'Not available'}
          🔗 <b>Release Page:</b> {html_url if html_url else '-'}
          """

          data = {
          "chat_id": os.environ.get("CHAT_ID"),
          "text": message,
          "parse_mode": "HTML",
          "disable_web_page_preview": True
          }

          encoded = urllib.parse.urlencode(data).encode()
          req = urllib.request.Request(f"https://api.telegram.org/bot{os.environ.get('TELEGRAM_TOKEN')}/sendMessage", data=encoded, method="POST")
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  resp.read()
          except Exception as e:
              print("Failed to send message:", e)
              sys.exit(1)

          # optionally send APK as document (Telegram will fetch the URL)
          if apk_url:
              doc = {
                  "chat_id": os.environ.get("CHAT_ID"),
                  "document": apk_url,
                  "caption": apk_name
              }
              try:
                  with urllib.request.urlopen(
                      urllib.request.Request(
                          f"https://api.telegram.org/bot{os.environ.get('TELEGRAM_TOKEN')}/sendDocument",
                          data=urllib.parse.urlencode(doc).encode(),
                          method="POST"
                      ), timeout=60
                  ) as r2:
                      r2.read()
              except Exception as e:
                  print("Failed to send APK document (non-fatal):", e)

          # write new last tag (the commit step will push it)
          os.makedirs(".github", exist_ok=True)
          try:
              with open(last_path, "w", encoding="utf-8") as f:
                  f.write(tag)
          except Exception as e:
              print("Failed to write last tag file:", e)
              sys.exit(1)

          print("Notification sent and last tag updated.")
          PY

      - name: Commit and push updated tag
        if: steps.notify.outputs == '' || always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last_announced_tag.txt || true
          git commit -m "Update announced KernelSU release to ${{ steps.release.outputs.tag }}" || echo "No changes to commit"
          git push origin HEAD:refs/heads/${{ github.ref_name }} || echo "Push blocked (protected branch?)"
