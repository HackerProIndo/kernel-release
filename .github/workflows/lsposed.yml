name: Notify Telegram on celebrate-template release

permissions:
  contents: write

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - id: fetch_channel
        name: Fetch latest LSPosed Telegram channel post and forward it to target chats
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python - <<'PY'
          import json, os, sys, urllib.request, urllib.parse

          channel_username = "LSPosed"
          state_path = ".github/last_announced_lsposed_state.txt"
          last_update_id = None
          last_message_id = 0
          initial_scan = not os.path.isfile(state_path)

          if os.path.isfile(state_path):
              try:
                  with open(state_path, "r", encoding="utf-8") as f:
                      content = f.read().strip()
                  if content:
                      parts = content.split()
                      if len(parts) >= 1:
                          last_update_id = int(parts[0])
                      if len(parts) >= 2:
                          last_message_id = int(parts[1])
              except Exception:
                  last_update_id = None
                  last_message_id = 0

          token = os.environ.get("TELEGRAM_TOKEN")
          if not token:
              print("Missing TELEGRAM_TOKEN")
              sys.exit(1)

          def telegram_request(method, data=None, timeout=30):
              url = f"https://api.telegram.org/bot{token}/{method}"
              req = urllib.request.Request(
                  url,
                  data=urllib.parse.urlencode(data or {}).encode() if data else None,
                  method="POST"
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return json.load(resp)

          def get_updates(offset=None, timeout=30, limit=100):
              payload = {"timeout": timeout, "limit": limit}
              if offset is not None:
                  payload["offset"] = offset
              try:
                  response = telegram_request("getUpdates", payload, timeout=timeout)
                  return response.get("result", []) or []
              except Exception as e:
                  print(f"getUpdates failed or timed out: {e}")
                  return []

          def get_group_chat_ids():
              ids = set()
              groups_file = ".github/group_chat_ids.txt"
              if os.path.isfile(groups_file):
                  try:
                      with open(groups_file, "r", encoding="utf-8") as f:
                          for line in f:
                              line = line.strip()
                              if line:
                                  ids.add(line)
                  except Exception:
                      pass

              try:
                  updates = get_updates(timeout=0, limit=100)
              except Exception:
                  updates = []

              last_update = None
              for upd in updates:
                  chat = None
                  if "message" in upd:
                      chat = upd["message"].get("chat")
                  elif "edited_message" in upd:
                      chat = upd["edited_message"].get("chat")
                  elif "my_chat_member" in upd:
                      chat = upd["my_chat_member"].get("chat")
                  elif "channel_post" in upd:
                      chat = upd["channel_post"].get("chat")
                  elif "edited_channel_post" in upd:
                      chat = upd["edited_channel_post"].get("chat")
                  if chat and chat.get("type") in ["group", "supergroup"]:
                      ids.add(str(chat.get("id")))
                  if upd.get("update_id") is not None:
                      last_update = max(last_update or -1, upd.get("update_id", -1))

              if last_update is not None:
                  try:
                      telegram_request("getUpdates", {"offset": last_update + 1}, timeout=30)
                  except Exception:
                      pass

              if ids:
                  try:
                      with open(groups_file, "w", encoding="utf-8") as f:
                          for cid in sorted(ids, key=lambda x: int(x) if x.lstrip("-").isdigit() else x):
                              f.write(str(cid) + "\n")
                  except Exception:
                      pass
              return ids

          def write_state(update_id, message_id):
              os.makedirs(os.path.dirname(state_path), exist_ok=True)
              with open(state_path, "w", encoding="utf-8") as f:
                  f.write(f"{update_id or 0} {message_id}\n")

          offset = last_update_id + 1 if last_update_id is not None else None
          updates = get_updates(offset=offset, timeout=30, limit=100)
          print(f"Checking updates: offset={offset} updates={len(updates)} initial_scan={initial_scan} last_update_id={last_update_id} last_message_id={last_message_id}")

          new_posts = []
          max_update_id = last_update_id if last_update_id is not None else -1
          highest_message_id = last_message_id

          for upd in updates:
              if upd.get("update_id") is not None:
                  max_update_id = max(max_update_id, upd["update_id"])
              msg = upd.get("channel_post") or upd.get("edited_channel_post")
              if not msg:
                  continue
              chat = msg.get("chat", {})
              if chat.get("type") != "channel":
                  continue
              username = (chat.get("username") or "").lstrip("@").lower()
              if username != channel_username.lower():
                  continue
              message_id = msg.get("message_id")
              if not isinstance(message_id, int):
                  continue
              highest_message_id = max(highest_message_id, message_id)
              if message_id <= last_message_id:
                  continue
              new_posts.append((message_id, chat.get("id")))

          if initial_scan:
              init_update_id = max_update_id if max_update_id >= 0 else 0
              write_state(init_update_id, highest_message_id)
              print(f"Initialized LSPosed channel state at update {init_update_id}, message {highest_message_id}.")
              sys.exit(0)

          if max_update_id >= 0 and max_update_id != (last_update_id or -1):
              write_state(max_update_id, last_message_id)

          if not new_posts:
              print("No new LSPosed channel posts to copy.")
              sys.exit(0)

          destination_chats = []
          if os.environ.get("CHAT_ID"):
              destination_chats.append(os.environ.get("CHAT_ID"))
          for cid in get_group_chat_ids():
              if cid and cid not in destination_chats:
                  destination_chats.append(cid)

          if not destination_chats:
              print("No destination chats configured. Set CHAT_ID or add group chat IDs.")
              sys.exit(1)

          copied_count = 0
          highest_message_id = last_message_id
          for message_id, from_chat_id in new_posts:
              for i, chat_id in enumerate(destination_chats):
                  try:
                      telegram_request(
                          "forwardMessage",
                          {
                              "chat_id": chat_id,
                              "from_chat_id": from_chat_id,
                              "message_id": message_id
                          },
                          timeout=30
                      )
                      copied_count += 1
                  except Exception as e:
                      print(f"Failed to forward message {message_id} to {chat_id}:", e)
                      if i == 0:
                          sys.exit(1)
              highest_message_id = max(highest_message_id, message_id)

          write_state(max_update_id, highest_message_id)
          print(f"Forwarded {copied_count} new message(s) from @{channel_username}.")
          PY

      - name: Commit and push updated channel state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last_announced_lsposed_state.txt
          git commit -m "Update last announced LSPosed channel state" || true
          git push origin HEAD:${{ github.ref_name }}
